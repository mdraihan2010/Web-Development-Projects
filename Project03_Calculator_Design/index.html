<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CSS Calculator</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Calculator</h1>

    <div class="calculator">
      <!-- ==========================
             Display Screen
        =========================== -->

      <div class="display"></div>

      <!-- ==========================
             Calculator Buttons
        =========================== -->

      <div class="buttons">
        <button class="dark-btn">C</button>

        <button class="dark-btn">+/-</button>

        <button class="dark-btn">%</button>

        <button class="operator">/</button>

        <button class="dark-btn">7</button>

        <button class="dark-btn">8</button>

        <button class="dark-btn">9</button>

        <button class="operator">×</button>

        <button class="dark-btn">4</button>

        <button class="dark-btn">5</button>

        <button class="dark-btn">6</button>

        <button class="operator">−</button>

        <button class="dark-btn">1</button>

        <button class="dark-btn">2</button>

        <button class="dark-btn">3</button>

        <button class="operator">+</button>

        <button class="dark-btn">0</button>

        <button class="dark-btn">.</button>

        <button class="dark-btn">DEL</button>

        <button class="equal">=</button>
      </div>
    </div>
  </body>
</html>
